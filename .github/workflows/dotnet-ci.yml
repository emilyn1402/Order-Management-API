name: .NET CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # Downloads your repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Install .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restore NuGet packages
    - name: Restore dependencies
      run: dotnet restore

    # Build project
    - name: Build project
      run: dotnet build --no-restore --configuration Release

    # Run tests later
    - name: Run tests
      run: echo "No tests yet" #dotnet test --no-build --verbosity normal - uncomment this when there is an item to test